<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Marginalia</title>
  <style>
    :root { --canvas: #F9F8F6; --ink: #1A1A1A; --accent: #8C8C8C; }
    /* Cursor */
    .cursor { width: 10px; height: 10px; background: var(--ink); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s ease; }
    /* Progress Bar */
    .progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--ink); width: 0%; z-index: 1000; }
    
    body { background: var(--canvas); color: var(--ink); font-family: 'Inter', sans-serif; cursor: none; }
    
    /* Layout */
    .container { max-width: 720px; margin: 10vh auto; padding: 0 2rem; }
    .fade-up { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
    .visible { opacity: 1; transform: translateY(0); }

    /* Typography */
    h1 { font-family: 'Playfair Display', serif; font-size: 4rem; }
    .editorial-content p:first-of-type::first-letter { font-family: 'Playfair Display', serif; float: left; font-size: 6rem; line-height: 0.8; padding-right: 0.2em; }
    
    /* Editor Styles */
    .editor-wrapper { background: white; border: 1px solid #eaeaea; border-radius: 12px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
    .toolbar { position: sticky; top: 10px; background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; gap: 10px; z-index: 100; }
  </style>
</head>
<body>
  <div class="cursor"></div>
  <div class="progress-bar" id="progressBar"></div>

  <!-- Editorial Section -->
  <main class="container fade-up">
    <h1>The Architecture of Romantic Melancholy</h1>
    <article class="editorial-content">
      <p>There is a specific geometry to the way classical poets approached ruin...</p>
    </article>
  </main>

  <!-- Editor Section -->
  <div class="container editor-wrapper fade-up">
    <div class="toolbar">
      <button onclick="document.execCommand('bold')">B</button>
      <button onclick="document.execCommand('italic')">I</button>
    </div>
    <div id="premium-editor" contenteditable="true"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
