<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Marginalia | Professional Editorial Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&family=Playfair+Display:ital,wght=0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9F6F0; }
        .serif-title { font-family: 'Playfair Display', serif; }
        .shimmer { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-stone-800 antialiased min-h-screen flex flex-col">

    <header class="sticky top-0 bg-[#F9F6F0]/90 backdrop-blur-md border-b border-stone-200 z-40 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center gap-4">
            <a href="#" onclick="window.location.hash = ''; return false;" class="serif-title text-2xl font-bold text-stone-900 tracking-tight shrink-0">
                the marginalia.
            </a>
            
            <div id="searchBarContainer" class="relative w-full max-w-xs hidden">
                <input type="text" id="globalSearch" oninput="UI.handleSearch(this.value)" placeholder="Search titles, excerpts, or tags..." class="w-full bg-stone-100 border border-stone-300 rounded-xl px-4 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-teal-600 transition-all">
            </div>

            <div id="headerActions" class="flex items-center space-x-3 shrink-0"></div>
        </div>
    </header>

    <main id="appWorkspace" class="flex-1 w-full max-w-6xl mx-auto px-6 py-12"></main>

    <footer class="border-t border-stone-200 bg-stone-100 py-6 text-center text-xs text-stone-500">
        &copy; 2026 The Marginalia Hub. Structured Architectural Engine.
    </footer>

    <script src="app.js"></script>
</body>
</html>
